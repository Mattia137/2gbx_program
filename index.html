<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Bridge - Program Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Fragment+Mono&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background-color: #000; color: #fff; font-family: 'Fragment Mono', monospace; overflow: hidden; }
        
        #ui { 
            position: absolute; top: 50%; left: 30px; transform: translateY(-50%); 
            display: flex; flex-direction: column; gap: 25px; z-index: 100; 
        }

        .control-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #888; }

        button { 
            background: transparent; color: white; border: 1px solid #444; padding: 12px 20px; 
            font-family: 'Fragment Mono', monospace; cursor: pointer; transition: 0.2s; 
            text-align: left; width: 220px; font-size: 11px; letter-spacing: 1px;
            text-transform: uppercase;
        }

        button:hover { border-color: #fff; }
        button.active { background: #fff; color: #000; border-color: #fff; }

        input[type=range] {
            width: 220px;
            appearance: none;
            background: #222;
            height: 2px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            appearance: none;
            width: 10px;
            height: 10px;
            background: #fff;
            cursor: pointer;
            border-radius: 50%;
        }

        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="control-group">
            <label>Visualization Mode</label>
            <button id="btn1" class="active">01_MASS_STAGING</button>
            <button id="btn2">02_PROGRAM_ANALYSIS</button>
        </div>

        <div class="control-group" id="point-ctrl-container" style="display:none;">
            <label>Point Size</label>
            <input type="range" id="point-size-ctrl" min="0.01" max="0.5" step="0.01" value="0.07">
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
        import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

        const GLOBAL_SCALE = 0.2;
        const ROTATION_SPEED = 0.003;
        const MASS_COLOR = 0x1a1a1a;

        let scene, camera, renderer, controls, massModel, programPoints;
        let isInteracting = false;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 10000);
            camera.position.set(45, 35, 45);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.4;
            document.body.appendChild(renderer.domElement);

            new RGBELoader().load('https://threejs.org/examples/textures/equirectangular/venice_sunset_1k.hdr', (t) => {
                t.mapping = THREE.EquirectangularReflectionMapping;
                scene.environment = t;
            });

            const sun = new THREE.DirectionalLight(0xffffff, 2.5);
            sun.position.set(20, 50, 20);
            scene.add(sun);
            scene.add(new THREE.HemisphereLight(0xffffff, 0x000000, 1.0));

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.addEventListener('start', () => isInteracting = true);
            controls.addEventListener('end', () => isInteracting = false);

            const gltfLoader = new GLTFLoader();
            const objLoader = new OBJLoader();

            // 1. Load Mass (GLB) + Overlay Wireframe
            gltfLoader.load('260227_masss_program.glb', (gltf) => {
                massModel = gltf.scene;
                massModel.scale.setScalar(GLOBAL_SCALE);
                
                massModel.traverse(child => {
                    if (child.isMesh) {
                        child.material = new THREE.MeshStandardMaterial({ 
                            color: MASS_COLOR,
                            roughness: 0.6
                        });

                        const wireGeom = new THREE.WireframeGeometry(child.geometry);
                        const wireMat = new THREE.LineBasicMaterial({ 
                            color: 0xffffff, 
                            transparent: true, 
                            opacity: 0.15 
                        });
                        const wireLine = new THREE.LineSegments(wireGeom, wireMat);
                        wireLine.name = "technical_wire";
                        child.add(wireLine);
                    }
                });
                scene.add(massModel);
            });

            // 2. Load Program (OBJ) as Point Cloud with Vertex Colors
            objLoader.load('260227_program.obj', (obj) => {
                const group = new THREE.Group();
                obj.traverse(child => {
                    if (child.isMesh) {
                        const pointsMat = new THREE.PointsMaterial({ 
                            size: 0.2, 
                            vertexColors: true,
                            transparent: true,
                            opacity: 0.9
                        });
                        const points = new THREE.Points(child.geometry, pointsMat);
                        group.add(points);
                    }
                });
                programPoints = group;
                programPoints.scale.setScalar(GLOBAL_SCALE);
                programPoints.visible = false;
                scene.add(programPoints);
            });

            // UI Interaction
            document.getElementById('btn1').onclick = (e) => toggleMode(1, e.target);
            document.getElementById('btn2').onclick = (e) => toggleMode(2, e.target);
            document.getElementById('point-size-ctrl').oninput = (e) => {
                const size = parseFloat(e.target.value);
                if (programPoints) {
                    programPoints.traverse(child => {
                        if (child.isPoints) child.material.size = size;
                    });
                }
            };

            window.addEventListener('resize', onResize);
        }

        function toggleMode(mode, btn) {
            if (!massModel || !programPoints) return;

            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const pointCtrl = document.getElementById('point-ctrl-container');

            if (mode === 1) {
                pointCtrl.style.display = "none";
                programPoints.visible = false;
                massModel.traverse(child => {
                    if (child.isMesh) {
                        child.material.visible = true; // Show faces
                        const wire = child.getObjectByName("technical_wire");
                        if (wire) wire.material.opacity = 0.15;
                    }
                });
            } else {
                pointCtrl.style.display = "flex";
                programPoints.visible = true;
                massModel.traverse(child => {
                    if (child.isMesh) {
                        child.material.visible = false; // Hide faces, keep child wireframe
                        const wire = child.getObjectByName("technical_wire");
                        if (wire) wire.material.opacity = 0.3; // Make wire more visible for analysis
                    }
                });
            }
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!isInteracting) {
                if (massModel) massModel.rotation.y += ROTATION_SPEED;
                if (programPoints) programPoints.rotation.y += ROTATION_SPEED;
            }
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
